<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gestion Badges - Profil utilisateur</title>
        <link rel="stylesheet" href="/main.css" />
        <link rel="stylesheet" href="index.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="app">
            <div class="sidebar">
                <div class="logo">
                    <i class="fa-solid fa-school"></i>
                    <div>
                        <span class="lycee">Lycée R. Queneau</span
                        ><span class="sous-titre">Yvetot</span>
                    </div>
                </div>
                <div class="sidebar-menu">
                    <button onclick="window.location.href = '/'" id="btnLogs">
                        <i class="fa-solid fa-clock"></i><span>Logs</span>
                    </button>
                    <button
                        onclick="window.location.href = '/admin/'"
                        id="btnAdmin"
                    >
                        <i class="fa-solid fa-users-gear"></i
                        ><span>Gestion</span>
                    </button>
                </div>
                <div class="system-info">
                    <div class="info-item">
                        <i class="fa-solid fa-qrcode"></i><span>RFID</span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-clock"></i
                        ><span id="liveTime"></span>
                    </div>
                </div>
            </div>
            <div class="main">
                <div class="header">
                    <button
                        onclick="window.location.href = '/admin/'"
                        class="btn-secondary"
                        style="margin-bottom: 15px"
                    >
                        <i class="fa-solid fa-arrow-left"></i> Retour
                    </button>
                    <h1>Profil utilisateur</h1>
                </div>
                <div class="card" id="userInfoCard">
                    <h2>
                        <i class="fa-solid fa-user"></i>
                        <span id="userFullName">Chargement...</span>
                    </h2>
                    <div class="user-actions">
                        <button id="deleteUser" class="delete-btn">
                            <i class="fa-solid fa-trash"></i> Supprimer
                            l'utilisateur
                        </button>
                    </div>
                </div>
                <div class="card">
                    <h2>
                        <i class="fa-solid fa-microchip"></i> Badges associés
                    </h2>

                    <!-- Nouvelle interface de scan -->
                    <div class="scan-badge-section">
                        <div class="scan-controls">
                            <button
                                id="scanButton"
                                class="btn-primary"
                                onclick="startScan()"
                            >
                                <i class="fa-solid fa-qrcode"></i> Scanner un
                                badge
                            </button>
                            <button
                                id="cancelScanButton"
                                class="btn-secondary hidden"
                                onclick="cancelScan()"
                            >
                                <i class="fa-solid fa-times"></i> Annuler
                            </button>
                        </div>

                        <div id="scanResult" class="scan-result hidden">
                            <div class="input-group">
                                <i class="fa-solid fa-id-card"></i>
                                <input
                                    type="text"
                                    id="scannedBadgeUid"
                                    placeholder="UID du badge scanné"
                                    readonly
                                />
                            </div>
                            <button
                                class="btn-primary"
                                onclick="addScannedBadge()"
                            >
                                <i class="fa-solid fa-plus"></i> Ajouter ce
                                badge
                            </button>
                        </div>
                    </div>

                    <div id="badgeList" class="badge-list"></div>
                </div>
                <div class="card">
                    <h2>
                        <i class="fa-solid fa-clock-rotate-left"></i> Historique
                        des passages
                    </h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>UID</th>
                                    <th>Date</th>
                                    <th>Heure</th>
                                    <th>Statut</th>
                                </tr>
                            </thead>
                            <tbody id="logsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script src="/main.js"></script>
        <script src="index.js"></script>
    </body>
</html>
